<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KYC Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Auth guard -->
    <!-- Auth guard: admin only -->
    <script>
      (function () {
        fetch("/api/auth/me")
          .then(function (r) {
            return r.json();
          })
          .then(function (d) {
            if (!d.authenticated) {
              window.location.replace("/login.html?admin=1");
            } else if (d.user.role !== "admin") {
              window.location.replace("/login.html?error=not_admin");
            } else {
              window.__kyc_user = d.user;
            }
          })
          .catch(function () {
            window.location.replace("/login.html?admin=1");
          });
      })();
    </script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --ink: #0d0f12;
        --soft: #4a5260;
        --line: #e4e7ed;
        --surface: #f7f8fa;
        --white: #fff;
        --navy: #1a1f2e;
        --green: #16a34a;
        --red: #dc2626;
        --amber: #d97706;
        --blue: #2563eb;
        --purple: #7c3aed;
        --r: 12px;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--surface);
        color: var(--ink);
        min-height: 100vh;
      }

      /* ─ Top bar ─ */
      .bar {
        background: var(--navy);
        height: 56px;
        padding: 0 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 200;
      }
      .bar-logo {
        display: flex;
        align-items: center;
        gap: 9px;
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 0.95rem;
        letter-spacing: -0.02em;
        color: #fff;
      }
      .bar-logo .mk {
        width: 28px;
        height: 28px;
        background: #fff;
        border-radius: 7px;
        display: grid;
        place-items: center;
      }
      .bar-logo .mk svg {
        width: 16px;
        height: 16px;
      }
      .bar-tag {
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4);
        background: rgba(255, 255, 255, 0.07);
        padding: 4px 10px;
        border-radius: 6px;
      }
      .btn-sm {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 6px 13px;
        border-radius: 7px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 0.75rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-sm:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      /* ─ Stats strip ─ */
      .stats {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 1px;
        background: var(--line);
        border-bottom: 1px solid var(--line);
      }
      .sc {
        background: var(--white);
        padding: 14px 20px;
      }
      .sc-l {
        font-size: 0.64rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--soft);
        margin-bottom: 5px;
      }
      .sc-v {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: -0.03em;
      }
      .c-g {
        color: var(--green);
      }
      .c-r {
        color: var(--red);
      }
      .c-b {
        color: var(--blue);
      }
      .c-a {
        color: var(--amber);
      }
      .c-p {
        color: var(--purple);
      }

      /* ─ Filters ─ */
      .fil {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        border-bottom: 1px solid var(--line);
        background: var(--white);
        flex-wrap: wrap;
      }
      .fb {
        padding: 6px 14px;
        border-radius: 7px;
        border: 1px solid var(--line);
        background: var(--surface);
        font-size: 0.74rem;
        font-weight: 600;
        color: var(--soft);
        cursor: pointer;
        transition: all 0.15s;
      }
      .fb:hover {
        border-color: #a0aab8;
        color: var(--ink);
      }
      .fb.on {
        background: var(--navy);
        color: #fff;
        border-color: var(--navy);
      }
      .sep {
        flex: 1;
      }
      .srch {
        position: relative;
      }
      .srch svg {
        position: absolute;
        left: 9px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--soft);
        pointer-events: none;
      }
      .srch input {
        padding: 6px 11px 6px 30px;
        border: 1px solid var(--line);
        border-radius: 7px;
        font-size: 0.74rem;
        font-family: "DM Sans", sans-serif;
        width: 200px;
        outline: none;
        background: var(--surface);
      }
      .srch input:focus {
        border-color: #a0aab8;
        background: var(--white);
      }

      /* ─ Table ─ */
      .tw {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--white);
      }
      thead th {
        padding: 11px 18px;
        text-align: left;
        font-size: 0.63rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--soft);
        border-bottom: 2px solid var(--line);
        white-space: nowrap;
        position: sticky;
        top: 56px;
        background: var(--white);
      }
      tbody tr {
        border-bottom: 1px solid var(--surface);
        transition: background 0.12s;
        cursor: pointer;
      }
      tbody tr:hover {
        background: #f0f4ff;
      }
      td {
        padding: 13px 18px;
        font-size: 0.8rem;
        vertical-align: middle;
      }
      .mono {
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
        color: var(--soft);
      }
      .dt {
        font-size: 0.72rem;
        color: var(--soft);
        white-space: nowrap;
        text-transform: capitalize;
      }
      .rv {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 0.95rem;
      }
      .rl {
        color: var(--green);
      }
      .rm {
        color: var(--amber);
      }
      .rh {
        color: var(--red);
      }

      /* badges */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 9px;
        border-radius: 5px;
        font-size: 0.64rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .b-approved {
        background: #dcfce7;
        color: #14532d;
      }
      .b-rejected {
        background: #fee2e2;
        color: #7f1d1d;
      }
      .b-pending_onfido {
        background: #dbeafe;
        color: #1e3a8a;
      }
      .b-pending_review {
        background: #fff7ed;
        color: #9a3412;
      }
      .b-processing {
        background: #fef9c3;
        color: #92400e;
      }
      .b-reviewing {
        background: #f3e8ff;
        color: #4c1d95;
      }
      .b-int {
        background: #f0fdf4;
        color: #15803d;
        border: 1px solid #bbf7d0;
      }
      .b-onf {
        background: #eff6ff;
        color: #1d4ed8;
        border: 1px solid #bfdbfe;
      }

      /* row actions */
      .acts {
        display: flex;
        gap: 5px;
      }
      .btn-v {
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid var(--line);
        background: var(--white);
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--soft);
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-v:hover {
        background: var(--surface);
        color: var(--ink);
      }
      .btn-ap {
        padding: 4px 10px;
        border-radius: 6px;
        border: none;
        background: #dcfce7;
        font-size: 0.7rem;
        font-weight: 700;
        color: #15803d;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-ap:hover {
        background: #bbf7d0;
      }
      .btn-rj {
        padding: 4px 10px;
        border-radius: 6px;
        border: none;
        background: #fee2e2;
        font-size: 0.7rem;
        font-weight: 700;
        color: #b91c1c;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-rj:hover {
        background: #fecaca;
      }
      .empty-row td {
        text-align: center;
        padding: 48px;
        color: var(--soft);
        font-size: 0.82rem;
      }

      /* ─ Modal overlay ─ */
      .ov {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.48);
        backdrop-filter: blur(4px);
        z-index: 300;
        display: none;
        align-items: flex-start;
        justify-content: center;
        padding: 24px;
        overflow-y: auto;
      }
      .ov.show {
        display: flex;
      }
      .md {
        background: var(--white);
        border-radius: 18px;
        width: 100%;
        max-width: 780px;
        margin: auto;
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.25);
        animation: slideUp 0.2s ease;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* modal header */
      .mh {
        padding: 24px 28px 18px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        border-radius: 18px 18px 0 0;
      }
      .mh-left .mid {
        font-family: "DM Mono", monospace;
        font-size: 0.68rem;
        color: var(--soft);
        margin-bottom: 5px;
      }
      .mh-left .mtitle {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 1.2rem;
        letter-spacing: -0.02em;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .btn-x {
        width: 30px;
        height: 30px;
        border-radius: 7px;
        border: 1px solid var(--line);
        background: var(--surface);
        cursor: pointer;
        display: grid;
        place-items: center;
        color: var(--soft);
        flex-shrink: 0;
        transition: all 0.15s;
      }
      .btn-x:hover {
        background: var(--line);
        color: var(--ink);
      }

      /* modal body */
      .mb {
        padding: 24px 28px;
      }

      /* section label */
      .sl {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.66rem;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--soft);
        margin-bottom: 12px;
        padding-bottom: 7px;
        border-bottom: 1px solid var(--surface);
      }

      /* ─ Onfido result card ─ */
      .onf-card {
        border-radius: 13px;
        overflow: hidden;
        margin-bottom: 22px;
        border: 1px solid #bfdbfe;
      }
      .onf-head {
        background: #1e3a8a;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .onf-head-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .onf-head-left svg {
        color: #93c5fd;
      }
      .onf-head-left span {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.85rem;
        color: #fff;
      }
      .onf-head-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .os-badge {
        padding: 4px 11px;
        border-radius: 5px;
        font-size: 0.63rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .os-processing {
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.8);
      }
      .os-approved {
        background: #16a34a;
        color: #fff;
      }
      .os-declined {
        background: #dc2626;
        color: #fff;
      }
      .os-review {
        background: #7c3aed;
        color: #fff;
      }
      .btn-poll {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 7px;
        color: #fff;
        font-size: 0.73rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        font-family: "DM Sans", sans-serif;
      }
      .btn-poll:hover {
        background: rgba(255, 255, 255, 0.22);
      }
      .btn-poll:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-poll .spin {
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255, 255, 255, 0.25);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
        display: none;
      }
      .btn-poll.ld .spin {
        display: block;
      }
      .btn-poll.ld .pl {
        display: none;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .onf-body {
        background: #eff6ff;
        padding: 18px 20px;
      }

      /* final verdict box */
      .verdict {
        border-radius: 10px;
        padding: 16px 18px;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .verdict.vp {
        background: #dcfce7;
        border: 1px solid #86efac;
      }
      .verdict.vr {
        background: #fee2e2;
        border: 1px solid #fca5a5;
      }
      .verdict.vw {
        background: #fef9c3;
        border: 1px solid #fde047;
      }
      .verdict-icon {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .vp .verdict-icon {
        background: #16a34a;
      }
      .vr .verdict-icon {
        background: #dc2626;
      }
      .vw .verdict-icon {
        background: #d97706;
      }
      .verdict-text strong {
        display: block;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.88rem;
        margin-bottom: 3px;
      }
      .verdict-text p {
        font-size: 0.74rem;
        color: var(--soft);
      }

      /* meta grid */
      .onf-meta {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 12px;
      }
      .om-item .ol {
        font-size: 0.62rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #3b82f6;
        margin-bottom: 3px;
      }
      .om-item .ov {
        font-size: 0.75rem;
        color: #1e3a8a;
        font-weight: 500;
        word-break: break-all;
        font-family: "DM Mono", monospace;
      }

      /* escalation reasons */
      .esc-wrap {
        margin-bottom: 12px;
      }
      .esc-label {
        font-size: 0.62rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #3b82f6;
        margin-bottom: 6px;
      }
      .chip {
        display: inline-block;
        background: rgba(37, 99, 235, 0.12);
        color: #1d4ed8;
        font-size: 0.66rem;
        font-weight: 600;
        padding: 3px 8px;
        border-radius: 4px;
        margin: 2px;
        font-family: "DM Mono", monospace;
      }

      /* output */
      .onf-out {
        background: rgba(255, 255, 255, 0.55);
        border-radius: 8px;
        padding: 11px;
        font-family: "DM Mono", monospace;
        font-size: 0.69rem;
        color: #1e3a8a;
        max-height: 130px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
        margin-bottom: 10px;
      }
      .poll-msg {
        font-size: 0.73rem;
        min-height: 18px;
        margin-top: 6px;
        font-weight: 500;
      }

      /* ─ Score cards ─ */
      .scores {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 22px;
      }
      .sc-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px 16px;
      }
      .sc-card .l {
        font-size: 0.62rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--soft);
        margin-bottom: 5px;
      }
      .sc-card .v {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      .sc-card .s {
        font-size: 0.68rem;
        color: var(--soft);
        margin-top: 4px;
      }
      .rb-wrap {
        height: 4px;
        background: var(--line);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 8px;
      }
      .rb {
        height: 100%;
        border-radius: 2px;
      }

      /* ─ Checks list ─ */
      .chk-list {
        margin-bottom: 22px;
      }
      .chk-row {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 10px 0;
        border-bottom: 1px solid var(--surface);
      }
      .chk-row:last-child {
        border-bottom: none;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dg {
        background: var(--green);
      }
      .dr {
        background: var(--red);
      }
      .da {
        background: var(--amber);
      }
      .db {
        background: var(--blue);
      }
      .dx {
        background: #cbd5e1;
      }
      .chk-n {
        flex: 1;
      }
      .chk-n .cn {
        font-size: 0.8rem;
        font-weight: 500;
      }
      .chk-n .ct {
        font-size: 0.67rem;
        color: var(--soft);
        margin-top: 2px;
      }
      .chk-v {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.77rem;
      }

      /* ─ OCR panel ─ */
      .ocr-panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 22px;
      }
      .ocr-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .og-item .ol {
        font-size: 0.62rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--soft);
        margin-bottom: 3px;
      }
      .og-item .ov {
        font-size: 0.78rem;
        font-weight: 500;
      }

      /* ─ File thumbs ─ */
      .thumbs {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 22px;
      }
      .thumb {
        border-radius: 9px;
        overflow: hidden;
        border: 1px solid var(--line);
        width: 150px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .thumb:hover {
        border-color: #a0aab8;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
      }
      .thumb img {
        width: 100%;
        height: 95px;
        object-fit: cover;
        display: block;
        background: #eee;
      }
      .thumb .tl {
        padding: 6px 9px;
        font-size: 0.63rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--soft);
        background: var(--surface);
      }

      /* ─ Review actions ─ */
      .rev-actions {
        display: flex;
        gap: 10px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }
      .btn-apv {
        flex: 1;
        padding: 11px;
        background: #dcfce7;
        border: none;
        border-radius: 9px;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.82rem;
        color: #15803d;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-apv:hover {
        background: #bbf7d0;
      }
      .btn-rej {
        flex: 1;
        padding: 11px;
        background: #fee2e2;
        border: none;
        border-radius: 9px;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.82rem;
        color: #b91c1c;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-rej:hover {
        background: #fecaca;
      }
      .btn-onfido-link {
        flex: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 11px 14px;
        background: #1e3a8a;
        border: none;
        border-radius: 9px;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.82rem;
        color: #fff;
        cursor: pointer;
        text-decoration: none;
        transition: background 0.15s;
      }
      .btn-onfido-link:hover {
        background: #1e40af;
      }

      @media (max-width: 900px) {
        .stats {
          grid-template-columns: repeat(3, 1fr);
        }
        .scores {
          grid-template-columns: repeat(2, 1fr);
        }
        .ocr-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 600px) {
        .mb {
          padding: 18px;
        }
        .onf-meta {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Top bar -->
    <header class="bar">
      <div class="bar-logo">
        <div class="mk">
          <svg

          >
            <path
              d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
            />
          </svg>
        </div>
        VerifyKYC
      </div>
      <div style="display: flex; align-items: center; gap: 10px">
        <span class="bar-tag">Admin</span>
        <!-- User info -->
        <div
          id="admin-user-info"
          style="
            display: none;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
          "
        >
          <div
            id="admin-avatar"
            style="
              width: 26px;
              height: 26px;
              border-radius: 50%;
              background: rgba(37, 99, 235, 0.5);
              display: grid;
              place-items: center;
              font-size: 0.7rem;
              font-weight: 700;
              color: #93c5fd;
              overflow: hidden;
              flex-shrink: 0;
            "
          ></div>
          <span
            id="admin-user-name"
            style="
              font-size: 0.78rem;
              color: rgba(255, 255, 255, 0.8);
              font-weight: 500;
            "
          ></span>
        </div>
        <button class="btn-sm" onclick="loadAll()">
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path d="M1 4v6h6M23 20v-6h-6" />
            <path
              d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"
            />
          </svg>
          Refresh
        </button>
        <button
          class="btn-sm"
          onclick="handleLogout()"
          style="
            background: rgba(220, 38, 38, 0.15);
            border-color: rgba(220, 38, 38, 0.3);
            color: #fca5a5;
          "
        >
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path
              d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"
            />
          </svg>
          Sign Out
        </button>

    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="sc">
        <div class="sc-l">Total</div>
        <div class="sc-v" id="s-tot">—</div>
      </div>
      <div class="sc">
        <div class="sc-l">Approved</div>
        <div class="sc-v c-g" id="s-app">—</div>
      </div>
      <div class="sc">
        <div class="sc-l">Rejected</div>
        <div class="sc-v c-r" id="s-rej">—</div>
      </div>
      <div class="sc">
        <div class="sc-l">Onfido Review</div>
        <div class="sc-v c-b" id="s-onf">—</div>
      </div>
      <div class="sc">
        <div class="sc-l">Processing</div>
        <div class="sc-v c-a" id="s-pro">—</div>
      </div>
      <div class="sc">
        <div class="sc-l">Approval Rate</div>
        <div class="sc-v c-p" id="s-rate">—</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="fil">
      <button class="fb on" onclick="setFilter(this, 'all')">All</button>
      <button class="fb" onclick="setFilter(this, 'processing')">
        Processing
      </button>
      <button class="fb" onclick="setFilter(this, 'pending_review')">
        Internal Review
      </button>
      <button class="fb" onclick="setFilter(this, 'approved')">Approved</button>
      <button class="fb" onclick="setFilter(this, 'rejected')">Rejected</button>
      <button class="fb" onclick="setFilter(this, 'pending_onfido')">
        Onfido Review
      </button>
      <button class="fb" onclick="setFilter(this, 'reviewing')">
        Manual Review
      </button>
      <div class="sep"></div>
      <div class="srch">
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        <input
          placeholder="Search application ID…"
          oninput="renderTable()"
          id="srchBox"
        />
      </div>
    </div>

    <!-- Table -->
    <div class="tw">
      <table>
        <thead>
          <tr>
            <th>Application ID</th>
            <th>Doc Type</th>
            <th>Status</th>
            <th>Risk Score</th>
            <th>Method</th>
            <th>Submitted</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr class="empty-row">
            <td colspan="7">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Modal -->
    <div class="ov" id="ov" onclick="closeBg(event)">
      <div class="md" id="md">
        <div class="mh">
          <div class="mh-left">
            <div class="mid" id="m-id">—</div>
            <div class="mtitle" id="m-title">—</div>
          </div>
          <button class="btn-x" onclick="closeModal()">
            <svg
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="mb" id="mb"></div>
      </div>
    </div>

    <script>
      /* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
      let allApps = [],
        activeFilter = "all",
        currentApp = null;

      /* ═══════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════ */
      loadAll();

      async function loadAll() {
        await Promise.all([fetchStats(), fetchApps()]);
      }

      /* ═══════════════════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════════════════ */
      async function fetchStats() {
        try {
          const d = await api("/api/stats");
          const s = d.stats || {};
          setText("s-tot", s.total ?? "—");
          setText("s-app", s.approved ?? "—");
          setText("s-rej", s.rejected ?? "—");
          setText("s-rev", s.pending_review ?? "—");
          setText("s-onf", s.pending_onfido ?? "—");
          setText("s-pro", s.processing ?? "—");
          setText("s-rate", (s.approval_rate ?? "—") + "%");
        } catch {}
      }

      /* ═══════════════════════════════════════════════════════════
   APPLICATIONS LIST
═══════════════════════════════════════════════════════════ */
      async function fetchApps() {
        try {
          const d = await api("/api/applications?limit=300");
          allApps = d.applications || [];
          renderTable();
        } catch {
          document.getElementById("tbody").innerHTML =
            '<tr class="empty-row"><td colspan="7">Failed to load — check server.</td></tr>';
        }
      }

      function setFilter(btn, f) {
        document
          .querySelectorAll(".fb")
          .forEach((b) => b.classList.remove("on"));
        btn.classList.add("on");
        activeFilter = f;
        renderTable();
      }

      function renderTable() {
        const q = document.getElementById("srchBox").value.toLowerCase().trim();
        let apps =
          activeFilter === "all"
            ? allApps
            : allApps.filter((a) => a.status === activeFilter);
        if (q)
          apps = apps.filter((a) => a.application_id.toLowerCase().includes(q));

        const tbody = document.getElementById("tbody");
        if (!apps.length) {
          tbody.innerHTML =
            '<tr class="empty-row"><td colspan="7">No applications found.</td></tr>';
          return;
        }

        tbody.innerHTML = apps
          .map((a) => {
            const v = a.verification || {};
            const risk = v.risk_score ?? null;
            const rc =
              risk === null ? "" : risk < 50 ? "rl" : risk < 75 ? "rm" : "rh";
            const dt = (a.document_type || "—").replace(/_/g, " ");
            const date = a.created_at ? fmtDate(a.created_at) : "—";
            const canReview = [
              "reviewing",
              "pending_onfido",
              "processing",
            ].includes(a.status);
            const meth = v.method;

            return `<tr onclick="openModal('${a.application_id}')">
      <td class="mono">${a.application_id}</td>
      <td class="dt">${dt}</td>
      <td>${badge(a.status)}</td>
      <td class="rv ${rc}">${risk !== null ? risk : "—"}</td>
      <td>${meth === "onfido" ? '<span class="badge b-onf">Onfido</span>' : meth === "internal" ? '<span class="badge b-int">Internal</span>' : '<span style="color:var(--soft);font-size:.74rem">—</span>'}</td>
      <td class="dt">${date}</td>
      <td onclick="event.stopPropagation()">
        <div class="acts">
          <button class="btn-v" onclick="openModal('${a.application_id}')">View</button>
          ${
            canReview
              ? `<button class="btn-ap" onclick="qAction('${a.application_id}','approve')">Approve</button>
          <button class="btn-rj" onclick="qAction('${a.application_id}','reject')">Reject</button>`
              : ""
          }
        </div>
      </td>
    </tr>`;
          })
          .join("");
      }

      function badge(s) {
        const lbl = {
          approved: "✓ Approved",
          rejected: "✗ Rejected",
          pending_review: "⏸ Internal Review",
          pending_onfido: "⟳ Onfido",
          processing: "⏳ Processing",
          reviewing: "◎ Review",
        };
        return `<span class="badge b-${s}">${lbl[s] || s}</span>`;
      }

      /* ═══════════════════════════════════════════════════════════
   MODAL — open + auto-poll Onfido if pending
═══════════════════════════════════════════════════════════ */
      async function openModal(appId) {
        setText("m-id", appId);
        setText("m-title", "Loading…");
        document.getElementById("mb").innerHTML =
          '<div style="padding:48px;text-align:center;color:var(--soft)">Loading…</div>';
        document.getElementById("ov").classList.add("show");

        try {
          const d = await api(`/api/applications/${appId}`);
          currentApp = d.application;

          // Auto-poll Onfido if still pending — get latest result before rendering
          if (
            currentApp.status === "pending_onfido" ||
            currentApp.status === "reviewing"
          ) {
            try {
              const pr = await api(`/api/applications/${appId}/onfido-result`);
              if (pr.success && pr.application) currentApp = pr.application;
            } catch {}
          }

          renderModal(currentApp);
        } catch {
          document.getElementById("mb").innerHTML =
            '<div style="padding:48px;text-align:center;color:var(--red)">Failed to load.</div>';
        }
      }

      function renderModal(app) {
        const v = app.verification || {};
        const face = v.face_match || {};
        const live = v.liveness || {};
        const exp = v.expiry || {};
        const fake = v.fake_document || {};
        const onf = app.onfido_data || {};
        const ocr = app.ocr_data || {};

        // Header
        setText("m-id", app.application_id);
        document.getElementById("m-title").innerHTML =
          badge(app.status) +
          `<span style="font-family:'DM Sans';font-weight:400;font-size:.82rem;color:var(--soft);text-transform:capitalize">&nbsp;${(app.document_type || "").replace(/_/g, " ")}</span>`;

        const risk = v.risk_score ?? null;
        const rc =
          risk === null ? "" : risk < 50 ? "rl" : risk < 75 ? "rm" : "rh";
        const rbColor =
          risk === null
            ? "#cbd5e1"
            : risk < 50
              ? "#16a34a"
              : risk < 75
                ? "#d97706"
                : "#dc2626";

        /* ── Scores ── */
        const faceScore = face.score ?? null;
        const liveScore = live.score ?? null;
        const framesChecked = face.frames_checked ?? 0;
        const framesMatched = face.frames_matched ?? 0;
        const faceColor =
          faceScore === null
            ? "var(--soft)"
            : faceScore >= 80
              ? "var(--green)"
              : faceScore >= 50
                ? "var(--amber)"
                : "var(--red)";
        const liveColor =
          liveScore === null
            ? "var(--soft)"
            : liveScore >= 50
              ? "var(--green)"
              : "var(--amber)";

        const scoresHtml = `
  <div class="sl">Verification Scores</div>
  <div class="scores">
    <div class="sc-card">
      <div class="l">Risk Score</div>
      <div class="v ${rc}">${risk !== null ? risk + " / 100" : "—"}</div>
      <div class="s">${risk !== null ? (risk < 50 ? "Low risk" : risk < 75 ? "Medium risk" : "High risk") : "N/A"}</div>
      <div class="rb-wrap"><div class="rb" style="width:${risk ?? 0}%;background:${rbColor}"></div></div>
    </div>
    <div class="sc-card">
      <div class="l">Face Match</div>
      <div class="v" style="color:${faceColor}">${faceScore !== null ? Math.round(faceScore) + "%" : "—"}</div>
      <div class="s">${
        face.match
          ? "✓ Confirmed"
          : faceScore !== null
            ? (faceScore >= 80 ? "✓ Match" : "✗ No match") +
              ` (${framesMatched}/${framesChecked} frames)`
            : framesChecked > 0
              ? "✗ Face not detected"
              : "N/A"
      }</div>
    </div>
    <div class="sc-card">
      <div class="l">Liveness</div>
      <div class="v" style="color:${liveColor}">${liveScore !== null ? Math.round(liveScore) + "%" : "—"}</div>
      <div class="s">${live.is_live ? "✓ Live detected" : liveScore !== null ? "✗ Failed" : "N/A"}</div>
    </div>
    
    </div>
  </div>`;

        /* ── Checks ── */
        const onf_reasons =
          (onf.escalation_reasons || []).join(" · ") ||
          "Escalated for external review";
        const checks = [
          {
            name: "Document Authenticity",
            dot: fake.is_fake ? "dr" : "dg",
            val: fake.is_fake ? "Suspicious" : "Passed",
            note:
              fake.reasons?.[0] ||
              (fake.is_fake ? "" : "No tampering detected"),
          },

          {
            name: "Face Match",
            dot: face.match
              ? "dg"
              : faceScore !== null
                ? faceScore >= 80
                  ? "dg"
                  : "dr"
                : framesChecked > 0
                  ? "dr"
                  : "dx",
            val: faceScore !== null ? Math.round(faceScore) + "%" : "—",
            note: face.match
              ? `Identity confirmed · ${framesMatched}/${framesChecked} frames`
              : faceScore !== null
                ? `Score ${Math.round(faceScore)}% · ${framesMatched}/${framesChecked} frames matched`
                : framesChecked > 0
                  ? "Face could not be detected in frames"
                  : "Not checked",
          },
          {
            name: "Liveness Detection",
            dot: live.is_live ? "dg" : liveScore !== null ? "da" : "dx",
            val: liveScore !== null ? Math.round(liveScore) + "%" : "—",
            note: live.is_live
              ? "Live person detected"
              : liveScore !== null
                ? "Failed"
                : "Not checked",
          },
          {
            name: "Verification Method",
            dot:
              v.method === "onfido"
                ? "db"
                : v.method === "internal"
                  ? "dg"
                  : "dx",
            val:
              v.method === "onfido"
                ? "Onfido"
                : v.method === "internal"
                  ? "Internal"
                  : "—",
            note:
              v.method === "onfido"
                ? onf_reasons
                : v.method === "internal"
                  ? `risk_score=${v.risk_score ?? "—"} (≤50) — awaiting admin decision`
                  : "",
          },
        ];

        const chksHtml = `
  <div class="sl">Checks Performed</div>
  <div class="chk-list">
    ${checks
      .map(
        (c) => `
      <div class="chk-row">
        <div class="dot ${c.dot}"></div>
        <div class="chk-n"><div class="cn">${c.name}</div>${c.note ? `<div class="ct">${c.note}</div>` : ""}</div>
        <div class="chk-v">${c.val}</div>
      </div>`,
      )
      .join("")}
  </div>`;

        /* ── OCR data ── */
        let ocrHtml = "";
        if (ocr && Object.keys(ocr).length) {
          const flds = [
            { l: "Full Name", v: ocr.full_name },
            { l: "Document No.", v: ocr.document_number },
            { l: "Date of Birth", v: ocr.date_of_birth },
            { l: "Issue Date", v: ocr.issue_date },
            { l: "Expiry Date", v: ocr.expiry_date },
            { l: "Nationality", v: ocr.nationality || ocr.license_class },
          ].filter((f) => f.v && f.v !== "null" && f.v !== "N/A");

          if (flds.length) {
            ocrHtml = `
      <div class="sl">OCR Extracted from Document</div>
      <div class="ocr-panel">
        <div class="ocr-grid">
          ${flds.map((f) => `<div class="og-item"><div class="ol">${f.l}</div><div class="ov">${f.v}</div></div>`).join("")}
        </div>
      </div>`;
          }
        }

        /* ── File thumbs ── */
        // Collect ALL file IDs — works for both internal and onfido verification
        const rawFiles = app.files || {};
        const fileMap = {};
        // Normalise: convert any ObjectId-like value to string and keep only non-empty ones
        for (const [k, v] of Object.entries(rawFiles)) {
          const sid =
            v && typeof v === "object" && v.$oid ? v.$oid : String(v || "");
          if (sid && sid.length > 4 && sid !== "null" && sid !== "undefined") {
            fileMap[k] = sid;
          }
        }
        const fileFields = [
          { k: "document_front", l: "Doc Front" },
          { k: "document_back", l: "Doc Back" },
          { k: "selfie_best_frame", l: "Selfie (Best Frame)" },
          { k: "selfie_photo", l: "Selfie Photo" },
          { k: "selfie_video", l: "Selfie Video" },
        ];
        const fileItems = fileFields.filter((f) => fileMap[f.k]);
        const filesHtml = fileItems.length
          ? `
  <div class="sl">Uploaded Documents</div>
  <div class="thumbs">
    ${fileItems
      .map((f) => {
        const isVideo = f.k === "selfie_video";
        const fileId = fileMap[f.k];
        return `
      <div class="thumb" onclick="window.open('/api/files/${fileId}','_blank')" title="Click to open full size">
        ${
          isVideo
            ? `<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#f0f4ff;border-radius:6px;flex-direction:column;gap:6px;">
               <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
               <span style="font-size:.72rem;color:#2563eb;font-weight:600">Play Video</span>
             </div>`
            : `<img src="/api/files/${fileId}" alt="${f.l}"
               onerror="this.style.display='none';this.parentElement.querySelector('.tl-err') && (this.parentElement.querySelector('.tl-err').style.display='block')"
               style="width:100%;height:100%;object-fit:cover;border-radius:6px;"/>`
        }
        <div class="tl">${f.l}</div>
        <div class="tl-err" style="display:none;color:#ef4444;font-size:.65rem;padding:2px 0">Failed to load</div>
      </div>`;
      })
      .join("")}
  </div>`
          : `<div class="sl">Uploaded Documents</div><p style="color:var(--soft);font-size:.85rem;padding:.5rem 0">No documents on file.</p>`;

        /* ── App meta ── */
        const metaHtml = `
  <div class="sl">Application Info</div>
  <div class="ocr-panel" style="margin-bottom:18px">
    <div class="ocr-grid">
      <div class="og-item"><div class="ol">Application ID</div><div class="ov" style="font-family:'DM Mono',monospace;font-size:.72rem">${app.application_id}</div></div>
      <div class="og-item"><div class="ol">Document Type</div><div class="ov" style="text-transform:capitalize">${(app.document_type || "—").replace(/_/g, " ")}</div></div>
      <div class="og-item"><div class="ol">Submitted</div><div class="ov">${app.created_at ? new Date(app.created_at).toLocaleString() : "—"}</div></div>
      ${app.reviewed_by ? `<div class="og-item"><div class="ol">Reviewed By</div><div class="ov">${app.reviewed_by}</div></div>` : ""}
      ${app.rejection_reason ? `<div class="og-item" style="grid-column:1/-1"><div class="ol" style="color:var(--red)">Rejection Reason</div><div class="ov" style="color:var(--red)">${app.rejection_reason}</div></div>` : ""}
    </div>
  </div>`;

        /* ── Review actions — always 3 buttons ── */
        const onfidoDashUrl = onf.workflow_run_id
          ? `https://dashboard.onfido.com/results/${onf.workflow_run_id}`
          : "https://dashboard.onfido.com/";

        const revHtml = `
  <div class="rev-actions">
    <button class="btn-apv" onclick="mAction('${app.application_id}','approve')">✓ Approve</button>
    <button class="btn-rej" onclick="mAction('${app.application_id}','reject')">✗ Reject</button>
    <a class="btn-onfido-link" href="${onfidoDashUrl}" target="_blank" rel="noopener">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Open in Onfido
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
    </a>
  </div>`;

        document.getElementById("mb").innerHTML =
          scoresHtml + chksHtml + ocrHtml + filesHtml + metaHtml + revHtml;
      }

      function closeModal() {
        document.getElementById("ov").classList.remove("show");
        currentApp = null;
      }
      function closeBg(e) {
        if (e.target === document.getElementById("ov")) closeModal();
      }

      /* ═══════════════════════════════════════════════════════════
   POLL ONFIDO RESULT
═══════════════════════════════════════════════════════════ */
      async function doPoll(appId) {
        const btn = document.getElementById("pollBtn");
        const msg = document.getElementById("pollMsg");
        if (!btn) return;
        btn.classList.add("ld");
        btn.disabled = true;
        if (msg) {
          msg.textContent = "Fetching latest result from Onfido…";
          msg.style.color = "#3b82f6";
        }

        try {
          const d = await api(`/api/applications/${appId}/onfido-result`);
          if (!d.success) throw new Error(d.error || "Failed");

          if (msg) {
            const os = d.onfido_status,
              as_ = d.app_status;
            msg.textContent = `Onfido: ${os} → Application: ${as_}`;
            msg.style.color =
              as_ === "approved"
                ? "var(--green)"
                : as_ === "rejected"
                  ? "var(--red)"
                  : "#1e40af";
          }

          // Re-render modal with latest data
          if (d.application) {
            currentApp = d.application;
            setTimeout(() => renderModal(currentApp), 600);
          }
          loadAll();
        } catch (e) {
          if (msg) {
            msg.textContent = "Error: " + e.message;
            msg.style.color = "var(--red)";
          }
          if (btn) {
            btn.classList.remove("ld");
            btn.disabled = false;
          }
        }
      }

      /* ═══════════════════════════════════════════════════════════
   APPROVE / REJECT
═══════════════════════════════════════════════════════════ */
      async function qAction(appId, action) {
        const reason =
          action === "reject"
            ? prompt("Rejection reason:") || "Failed manual review"
            : "";
        await doReview(appId, action, reason);
        await loadAll();
      }
      async function mAction(appId, action) {
        const reason =
          action === "reject"
            ? prompt("Rejection reason:") || "Failed manual review"
            : "";
        await doReview(appId, action, reason);
        closeModal();
        await loadAll();
      }
      async function doReview(appId, action, reason = "") {
        try {
          await fetch(`/api/applications/${appId}/review`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action,
              reviewer: "admin",
              notes: reason,
              reason,
            }),
          });
        } catch (e) {
          alert("Failed: " + e.message);
        }
      }

      /* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
      async function api(url) {
        const r = await fetch(url);
        const d = await r.json();
        if (!r.ok || d.error) throw new Error(d.error || r.statusText);
        return d;
      }
      function setText(id, val) {
        const el = document.getElementById(id);
        if (el) el.textContent = val;
      }
      function fmtDate(iso) {
        return new Date(iso).toLocaleDateString("en-GB", {
          day: "2-digit",
          month: "short",
          year: "numeric",
        });
      }

      // ── Auth: populate user info in top bar ────────────────────────────────
      document.addEventListener("DOMContentLoaded", function () {
        fetch("/api/auth/me")
          .then((r) => r.json())
          .then((d) => {
            if (!d.authenticated) {
              window.location.replace("/login.html");
              return;
            }
            const u = d.user;
            const info = document.getElementById("admin-user-info");
            const nameEl = document.getElementById("admin-user-name");
            const avatarEl = document.getElementById("admin-avatar");
            if (nameEl) nameEl.textContent = u.name || u.email || "Admin";
            if (avatarEl) {
              if (u.avatar) {
                avatarEl.innerHTML = `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;" />`;
              } else {
                avatarEl.textContent = (u.name || "A")[0].toUpperCase();
              }
            }
            if (info) info.style.display = "flex";
          })
          .catch(() => {
            window.location.replace("/login.html");
          });
      });

      async function handleLogout() {
        await fetch("/api/auth/logout", { method: "POST" });
        window.location.href = "/login.html";
      }
    </script>
  </body>
</html>
